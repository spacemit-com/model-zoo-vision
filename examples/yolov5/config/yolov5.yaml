# YOLOv5 目标检测模型配置
model_path: ~/.cache/models/vision/yolov5/yolov5n.q.onnx
test_image: ~/.cache/assets/image/006_test.jpg
label_file_path: assets/labels/coco.txt
image_size: [640, 640]
class: deploy.yolov5.YOLOv5Detector
default_params:
  conf_threshold: 0.25
  iou_threshold: 0.45
  num_threads: 4
  providers:
    - SpaceMITExecutionProvider
